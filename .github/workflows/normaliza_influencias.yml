name: Normaliza influencias

on:
  push:
    branches: ["main"]
    paths:
      - "modelos/**"
      - "scripts/normaliza_influencias.py"
      - ".github/workflows/normaliza_influencias.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run normalizer
        run: python scripts/normaliza_influencias.py

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: normaliza influencias"
            git push
          fi
