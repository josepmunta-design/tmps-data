name: Build escuelas json + validación

on:
  push:
    branches:
      - main
    paths:
      - 'data/Core/escuelas/**/*.json'
      - 'tools/build-escuelas-json.mjs'
      - '.github/workflows/build-escuelas-json.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-escuelas-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generar JSON y validar
        run: node tools/build-escuelas-json.mjs

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/indices/escuelas-unidas.json
          git add data/indices/escuelas-validacion.json

          if git diff --cached --quiet; then
            echo "No hay cambios para commit"
            exit 0
          fi

          git commit -m "chore(indices): actualizar escuelas json + validación"
          git push
