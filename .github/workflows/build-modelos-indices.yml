name: Build modelos indices

on:
  push:
    branches:
      - main
    paths:
      - 'tools/build-modelos-indices.mjs'
      - '.github/workflows/build-modelos-indices.yml'
  workflow_run:
    workflows:
      - Build modelos unidos
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-modelos-indices:
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generar indices para IA
        run: node tools/build-modelos-indices.mjs

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/indices/modelos-unidos.ndjson data/indices/modelos-index.json

          if git diff --cached --quiet; then
            echo "No hay cambios para commit"
            exit 0
          fi

          git commit -m "chore(indices): actualizar modelos-index"
          git push
