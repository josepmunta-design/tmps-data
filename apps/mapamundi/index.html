<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mapa mundi — Modelos por universidad (slider temporal)</title>

  <!-- D3 -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <!-- TopoJSON -->
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

  <style>
    :root{
      --bg:#0b0f14;
      --panel:#131a22;
      --muted:#6b7a8c;
      --text:#e7edf5;
      --accent:#D9AA3F;

      --land:#0f1620;
      --landStroke:#273243;
      --graticule:rgba(255,255,255,0.07);

      --dotStroke:rgba(0,0,0,0.55);
      --dotGlow:rgba(255,255,255,0.10);
    }

    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,'Helvetica Neue',Arial,sans-serif;
    }

    .app{
      height:100vh; width:100vw;
      display:grid;
      grid-template-columns: 360px 1fr;
      gap:14px;
      padding:14px;
      box-sizing:border-box;
    }
    @media(max-width: 980px){
      .app{grid-template-columns: 1fr; grid-template-rows:auto 1fr;}
    }

    .panel{
      background: linear-gradient(180deg, rgba(19,26,34,0.82), rgba(19,26,34,0.62));
      border:1px solid rgba(255,255,255,0.10);
      border-radius:16px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .left{ padding:14px; overflow:auto; }

    .title{
      font-family:'Montserrat',system-ui,sans-serif;
      font-weight:800;
      letter-spacing:-0.3px;
      font-size:18px;
      margin:0 0 8px 0;
      line-height:1.2;
    }
    .subtitle{
      color:#c7d2e1;
      opacity:.85;
      font-size:12.5px;
      line-height:1.35;
      margin-bottom:12px;
    }

    .card{
      background: rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:14px;
      padding:12px;
      margin:12px 0;
    }

    .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
    label{font-size:12px;color:#9fb0c3;}

    input[type="range"]{
      width:100%;
      appearance:none; -webkit-appearance:none;
      height:4px; border-radius:999px;
      background: linear-gradient(90deg, rgba(217,170,63,.40), rgba(217,170,63,.15));
      border:1px solid rgba(255,255,255,.08);
      outline:none;
    }
    input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none; appearance:none;
      width:18px; height:18px; border-radius:50%;
      background: var(--accent);
      border:1px solid rgba(255,255,255,0.25);
      box-shadow: 0 0 0 4px rgba(217,170,63,.15);
      cursor:pointer;
    }

    .yearBig{
      font-size:34px;
      font-weight:850;
      letter-spacing:-0.8px;
      margin:6px 0 0 0;
    }

    .hint{
      font-size:12px;
      color:#b8c6d6;
      line-height:1.35;
      margin-top:8px;
    }

    .legend{
      display:flex; flex-wrap:wrap; gap:8px;
      margin-top:10px;
    }
    .lg{
      display:inline-flex; gap:8px; align-items:center;
      font-size:12px;
      color:#dfe6f1;
      padding:6px 10px;
      border-radius:999px;
      background: rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.10);
      cursor:pointer;
      user-select:none;
    }
    .lg.off{opacity:.35}
    .swatch{
      width:10px; height:10px; border-radius:50%;
      box-shadow:0 0 0 2px rgba(0,0,0,0.35);
    }

    .right{ position:relative; overflow:hidden; }
    svg{ width:100%; height:100%; display:block; }

    .tooltip{
      position:fixed;
      pointer-events:none;
      background:#111821;
      border:1px solid #2b384b;
      color:#eaf1f8;
      padding:10px 12px;
      border-radius:10px;
      font-size:12px;
      line-height:1.35;
      max-width:340px;
      opacity:0;
      transform:translate(0,-6px);
      transition:opacity .12s, transform .12s;
      z-index:999999;
    }

    .btn{
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color:#e7edf5;
      padding:8px 10px;
      border-radius:12px;
      cursor:pointer;
      font-size:12px;
      font-weight:700;
      user-select:none;
    }
    .btn:hover{border-color:#3a4d67}
    /* =========================
   LAYOUT tipo 7.5 zoom:
   mapa full-screen + panel flotante blur
   PÉGALO AL FINAL DEL <style>
   ========================= */

:root{
  --leftPanelW: 360px;
  --edgePad: 14px;
}

html, body{
  height: 100%;
  overflow: hidden; /* el mapa hace pan/zoom; no queremos scroll de página */
}

.app{
  position: relative !important;
  width: 100vw !important;
  height: 100vh !important;
  display: block !important; /* mata el grid */
}

/* Mapa: ocupa TODA la pantalla */
#mapWrap{
  position: fixed !important;
  inset: 0 !important;
  z-index: 0 !important;
}

#svg{
  width: 100% !important;
  height: 100% !important;
  display: block !important;
}

/* Panel izquierdo: ventana flotante (glass) */
.panel.left, .left.panel, .panel.left{
  position: fixed !important;
  top: var(--edgePad) !important;
  left: var(--edgePad) !important;
  width: var(--leftPanelW) !important;
  max-width: calc(100vw - (var(--edgePad) * 2)) !important;
  max-height: calc(100vh - (var(--edgePad) * 2)) !important;

  overflow: auto !important;
  z-index: 6500 !important;
  pointer-events: auto !important;

  /* si por lo que sea tu .panel no lo trae ya, lo reforzamos */
  background: linear-gradient(180deg, rgba(19,26,34,0.82), rgba(19,26,34,0.62)) !important;
  border: 1px solid rgba(255,255,255,0.10) !important;
  border-radius: 16px !important;
  backdrop-filter: blur(10px) !important;
  -webkit-backdrop-filter: blur(10px) !important;
  box-shadow: 0 18px 50px rgba(0,0,0,0.45) !important;
}

/* Tooltip por encima de todo */
#tooltip, .tooltip{
  z-index: 999999 !important;
}

/* Móvil: panel tipo bottom-sheet */
@media (max-width: 900px){
  .panel.left, .left.panel, .panel.left{
    left: var(--edgePad) !important;
    right: var(--edgePad) !important;
    width: auto !important;

    top: auto !important;
    bottom: var(--edgePad) !important;
    height: 44vh !important;
  }
}
/* =========================
   TOPBAR (slider superior)
   ========================= */
.topbar{
  position: fixed;
  top: var(--edgePad);
  left: calc(
    var(--leftPanelW) + var(--edgePad) +
    (100vw - var(--leftPanelW) - (var(--edgePad) * 2)) / 2
  );
  transform: translateX(-50%) scale(var(--topbarScale, 1));
transform-origin: top center;


  width: min(
    1100px,
    calc(100vw - var(--leftPanelW) - (var(--edgePad) * 2))
  );

  z-index: 9000;
  pointer-events: auto;
}


.topbar-inner{
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 16px;

  background: rgba(15,22,32,0.55);
  border: 1px solid rgba(255,255,255,0.10);

  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  box-shadow: 0 14px 45px rgba(0,0,0,.38);
}

.topbar-meta{
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 72px;
}

.topbar-kicker{
  font-size: 11px;
  color: rgba(231,237,245,0.65);
  letter-spacing: .02em;
}

.topbar-year{
  font-size: 18px;
  font-weight: 800;
  line-height: 1;
}

#yearRange{
  flex: 1;
  min-width: 280px;
}

/* móvil: que no “reviente” */
@media (max-width: 640px){
  .topbar-inner{ flex-wrap: wrap; }
  #yearRange{ min-width: 180px; width: 100%; }
}

/* Oculta el header/menu de Teachable */
header,
.site-header,
.header,
.navbar,
#header{
  display: none !important;
}

/* Por si Teachable mete padding-top por header fijo */
body{
  padding-top: 0 !important;
}
/* =========================
   FIX CONTRASTE TEACHABLE
   Título + año + slider
   ========================= */

/* Título panel izquierdo */
.panel.left .title{
  color: #ffffff !important;
  opacity: 1 !important;
  text-shadow: 0 1px 2px rgba(0,0,0,.45);
}

/* Subtítulo */
.panel.left .subtitle{
  color: rgba(231,237,245,.88) !important;
  opacity: 1 !important;
}

/* Año grande (si vuelve a estar en panel en algún momento) */
.yearBig{
  color: var(--accent) !important;
  opacity: 1 !important;
  text-shadow: 0 0 8px rgba(217,170,63,.25);
}

/* ===== TOPBAR ===== */

/* “Año” (kicker) */
.topbar-kicker{
  color: rgba(231,237,245,.85) !important;
  opacity: 1 !important;
}

/* Número de año */
.topbar-year{
  color: var(--accent) !important;
  opacity: 1 !important;
  text-shadow: 0 0 10px rgba(217,170,63,.35);
}

/* Botón Recentrar */
.topbar .btn{
  color: #ffffff !important;
  opacity: 1 !important;
}

/* Slider (por si Teachable lo apaga) */
#yearRange{
  opacity: 1 !important;
  filter: none !important;
}
/* =========================
   TOPBAR · FILAS
   ========================= */

.topbar-stack{
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.topbar-row{
  display: flex;
  align-items: center;
  gap: 12px;
}

/* =========================
   BOTONES ESCUELAS
   ========================= */

.topbar-schools{
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
}

.school-btn{
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 700;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: #e7edf5;
  cursor: pointer;
  user-select: none;
  transition: all .15s ease;
}

.school-btn:hover{
  background: rgba(255,255,255,0.12);
}

.school-btn.off{
  opacity: .35;
}
/* ===== FORZAR TOPBAR VISIBLE (debug/fix) ===== */
/* ===== FORZAR TOPBAR VISIBLE (debug/fix) ===== */
.topbar{
  display: block !important;
  opacity: 1 !important;
  visibility: visible !important;
  pointer-events: auto !important;

  position: fixed !important;
  top: var(--edgePad) !important;

  /* 👇 centrado entre panel izquierdo y borde derecho */
  left: calc(
    var(--leftPanelW) + var(--edgePad) +
    (100vw - var(--leftPanelW) - (var(--edgePad) * 2)) / 2
  ) !important;
  transform: translateX(-50%) !important;

  width: min(
    1100px,
    calc(100vw - var(--leftPanelW) - (var(--edgePad) * 2))
  ) !important;

  z-index: 999999 !important;
}
@media (max-width: 900px){
  .topbar{
    left: 50% !important;
    transform: translateX(-50%) !important;
    width: min(
      1100px,
      calc(100vw - (var(--edgePad) * 2))
    ) !important;
  }
}

/* que no quede “lavada” */
.topbar-inner{
  background: rgba(15,22,32,0.78) !important; /* sube opacidad */
  border: 1px solid rgba(255,255,255,0.14) !important;
  box-shadow: 0 16px 55px rgba(0,0,0,.55) !important;
  filter: none !important;
}

/* por si algún estilo global mete blur al contenedor */
.topbar, .topbar *{
  filter: none !important;
}
/* =========================
   TOPBAR · SLIDER FULL WIDTH
   ========================= */

.topbar-slider-row{
  width: 80%;
}

.topbar-slider-row #yearRange{
  width: 80% !important;
  min-width: 80% !important;
}
.modelInfo{
  color: #c6d2e2;
  font-size: 12px;
  line-height: 1.35;
}

.modelInfo .mi-title{
  font-weight: 900;
  font-size: 13px;
  color: #fff;
  margin-bottom: 6px;
}

.modelInfo .mi-sub{
  opacity: .9;
  margin-bottom: 10px;
}

.modelInfo .mi-row{
  margin: 6px 0;
}

.modelInfo .mi-k{
  color: rgba(231,237,245,.78);
  font-weight: 700;
}

.modelInfo .mi-pill{
  display: inline-block;
  margin: 4px 6px 0 0;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.10);
}
/* =========================
   PANEL IZQUIERDO · MODELO
   Estilo diagrama temporal
   ========================= */

.model-panel{
  padding: 0;
  overflow: hidden;
}

.modelPanel{
  padding: 18px 16px;
  color: #e7edf5;
  font-size: 13px;
  line-height: 1.45;
}

/* Etiqueta superior (orientación) */
.modelPanel .mp-tag{
  display: inline-block;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .3px;
  margin-bottom: 10px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
}

/* Título principal */
.modelPanel .mp-title{
  font-size: 20px;
  font-weight: 900;
  line-height: 1.15;
  margin-bottom: 8px;
  color: #ffffff;
}

/* Autor */
.modelPanel .mp-author{
  font-size: 13px;
  font-weight: 700;
  color: #cfd9e6;
  margin-bottom: 10px;
}

/* Metadatos (año, universidad, lugar) */
.modelPanel .mp-meta{
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}

.modelPanel .mp-pill{
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  color: #dfe6f1;
}

/* Texto largo (descripción) */
.modelPanel .mp-desc{
  margin-top: 6px;
  font-size: 13px;
  line-height: 1.55;
  color: #e3ebf6;
}

/* Secciones secundarias */
.modelPanel .mp-section{
  margin-top: 16px;
  padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.10);
}

.modelPanel .mp-section h4{
  margin: 0 0 6px 0;
  font-size: 12px;
  font-weight: 900;
  color: #ffffff;
}

/* Estado inicial (mejorado) */
.modelPanel .mp-hint{
  position: relative;
  margin: 10px 0 0 0;
  padding: 12px 14px 12px 40px;

  font-size: 13px;
  line-height: 1.35;
  font-weight: 700;
  color: rgba(231,237,245,.86);

  background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
  border: 1px solid rgba(255,255,255,.10);
  border-radius: 14px;

  box-shadow: 0 10px 26px rgba(0,0,0,.28);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

/* Icono “cursor” sutil */
.modelPanel .mp-hint::before{
  content: "⌖";
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);

  width: 22px;
  height: 22px;
  display: grid;
  place-items: center;

  font-size: 14px;
  font-weight: 900;
  color: var(--accent);

  background: rgba(217,170,63,.10);
  border: 1px solid rgba(217,170,63,.22);
  border-radius: 10px;

  box-shadow: 0 0 0 4px rgba(217,170,63,.06);
}
.modelPanel .mp-hint{
  animation: hintIn .35s ease both;
}

@keyframes hintIn{
  from{ opacity: 0; transform: translateY(6px); }
  to{ opacity: 1; transform: translateY(0); }
}

/* =========================
   SCROLLBAR · estética glass
   (Chrome/Edge/Safari + Firefox)
   ========================= */

/* Firefox */
.panel.left{
  scrollbar-width: thin;
  scrollbar-color: rgba(231,237,245,0.28) rgba(255,255,255,0.06);
}

/* WebKit (Chrome/Edge/Safari) */
.panel.left::-webkit-scrollbar{
  width: 10px;
}

.panel.left::-webkit-scrollbar-track{
  background: rgba(255,255,255,0.05);
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.06);
}

.panel.left::-webkit-scrollbar-thumb{
  background: linear-gradient(
    180deg,
    rgba(231,237,245,0.28),
    rgba(231,237,245,0.14)
  );
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.10);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
}

.panel.left::-webkit-scrollbar-thumb:hover{
  background: linear-gradient(
    180deg,
    rgba(231,237,245,0.36),
    rgba(231,237,245,0.18)
  );
}

/* Esquina (si aparece) */
.panel.left::-webkit-scrollbar-corner{
  background: transparent;
}
/* Lista clicable dentro del panel de cluster */
.mi-item{
  cursor: pointer;
  border-radius: 10px;
  padding: 6px 8px;
  margin: 2px 0;
  transition: background .12s ease, border-color .12s ease;
  border: 1px solid transparent;
}

.mi-item:hover{
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.10);
}
/* Lista dentro del panel mp (clusters) */
.modelPanel .mi-item{
  padding: 8px 10px;
  border-radius: 12px;
  margin: 4px 0;
}
/* =========================
   YEAR OVERLAY (año fijo en el centro)
   ========================= */

.year-overlay{
  position: fixed;
  inset: 0;                 /* ocupa toda la pantalla */
  pointer-events: none;
  z-index: 9999;

  opacity: 0;
  transition: opacity .25s ease;
}

.year-overlay.show{ opacity: 1; }

/* El AÑO: siempre clavado al centro */
.year-overlay .yo-year{
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  font-size: 64px;
  font-weight: 900;
  letter-spacing: 1px;
  line-height: 1;

  color: rgba(231,237,245,0.95);
  text-align: center;

  text-shadow:
    0 10px 40px rgba(0,0,0,0.55),
    0 2px 10px rgba(0,0,0,0.45);
}

/* La LISTA: anclada debajo del año (sin moverlo) */
.year-overlay .yo-hit{
  position: absolute;
  top: calc(50% + 44px);    /* ajusta si quieres: distancia desde el centro */
  left: 50%;
  transform: translateX(-50%);

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;

  padding: 8px 12px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,.10);
  background: rgba(255,255,255,.06);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 10px 26px rgba(0,0,0,.25);

  max-width: min(560px, 82vw);

  opacity: 0;
  transform-origin: top center;
  transition: opacity .12s ease, transform .12s ease;
}

/* cuando hay hits */
.year-overlay.showHit .yo-hit{
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* cada línea */
.year-overlay .yo-hit .hit-item{
  width: 100%;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 13px;
  font-weight: 700;
  color: rgba(231,237,245,.92);
}

/* =========================
   SLIDER · EFECTO LLAMADA
   ========================= */
/* =========================
   SLIDER · EFECTO LLAMADA (más visible)
   ========================= */

#yearRange.attention::-webkit-slider-thumb{
  animation: pulseGlow 1.25s ease-out infinite;
  will-change: transform, box-shadow, filter;
  transform-origin: center;
}

#yearRange.attention::-moz-range-thumb{
  animation: pulseGlow 1.25s ease-out infinite;
  will-change: transform, box-shadow, filter;
  transform-origin: center;
}

@keyframes pulseGlow{
  0%{
    transform: scale(1);
    filter: drop-shadow(0 0 0 rgba(217,170,63,0));
    box-shadow:
      0 0 0 0 rgba(217,170,63,.55),
      0 0 0 10px rgba(217,170,63,.26),
      0 0 0 22px rgba(217,170,63,.12);
  }
  45%{
    transform: scale(1.10);
    filter: drop-shadow(0 0 10px rgba(217,170,63,.25));
  }
  100%{
    transform: scale(1);
    filter: drop-shadow(0 0 0 rgba(217,170,63,0));
    box-shadow:
      0 0 0 0 rgba(217,170,63,0),
      0 0 0 28px rgba(217,170,63,0),
      0 0 0 48px rgba(217,170,63,0);
  }
}
#yearRange{ -webkit-appearance:none; appearance:none; }
.rangeWrap{
  position: relative;
  width: 100%;
}

.rangeHalo{
  position: absolute;
  top: 50%;
  left: 0;
  width: 18px;
  height: 18px;
  border-radius: 999px;
  transform: translate(-50%, -50%);
  pointer-events: none;
  opacity: 0;
}

.rangeWrap.attention .rangeHalo{
  opacity: 1;
  animation: haloPulse 1.25s ease-out infinite;
}

@keyframes haloPulse{
  0%{
    box-shadow:
      0 0 0 0 rgba(217,170,63,.55),
      0 0 0 10px rgba(217,170,63,.22),
      0 0 0 22px rgba(217,170,63,.10);
  }
  100%{
    box-shadow:
      0 0 0 28px rgba(217,170,63,0),
      0 0 0 46px rgba(217,170,63,0),
      0 0 0 62px rgba(217,170,63,0);
  }
}
/* =========================
   SLIDER · EFECTO LLAMADA (más visible)
   ========================= */

/* Thumb (círculo del slider) - Cambia de #yearRange.attention a .rangeWrap.attention #yearRange */
.rangeWrap.attention #yearRange::-webkit-slider-thumb {
  animation: pulseGlow 1.25s ease-out infinite;
  will-change: transform, box-shadow, filter;
  transform-origin: center;
}

.rangeWrap.attention #yearRange::-moz-range-thumb {
  animation: pulseGlow 1.25s ease-out infinite;
  will-change: transform, box-shadow, filter;
  transform-origin: center;
}

/* Keyframes (ya existen, no cambies) */
@keyframes pulseGlow {
  0% {
    transform: scale(1);
    filter: drop-shadow(0 0 0 rgba(217,170,63,0));
    box-shadow:
      0 0 0 0 rgba(217,170,63,.55),
      0 0 0 10px rgba(217,170,63,.26),
      0 0 0 22px rgba(217,170,63,.12);
  }
  45% {
    transform: scale(1.10);
    filter: drop-shadow(0 0 10px rgba(217,170,63,.25));
  }
  100% {
    transform: scale(1);
    filter: drop-shadow(0 0 0 rgba(217,170,63,0));
    box-shadow:
      0 0 0 0 rgba(217,170,63,0),
      0 0 0 28px rgba(217,170,63,0),
      0 0 0 48px rgba(217,170,63,0);
  }
}

/* Halo (el círculo pulsante alrededor) - Ya existe, pero asegúrate de que sea visible */
.rangeWrap {
  position: relative;
  width: 100%;
}

.rangeHalo {
  position: absolute;
  top: 50%;
  left: 0; /* Esto se ajustará dinámicamente en JS para seguir al thumb */
  width: 18px;
  height: 18px;
  border-radius: 999px;
  transform: translate(-50%, -50%);
  pointer-events: none;
  opacity: 0;
}

.rangeWrap.attention .rangeHalo {
  opacity: 1;
  animation: haloPulse 1.25s ease-out infinite;
}

/* Keyframes del halo (ya existen) */
@keyframes haloPulse {
  0% {
    box-shadow:
      0 0 0 0 rgba(217,170,63,.55),
      0 0 0 10px rgba(217,170,63,.22),
      0 0 0 22px rgba(217,170,63,.10);
  }
  100% {
    box-shadow:
      0 0 0 28px rgba(217,170,63,0),
      0 0 0 46px rgba(217,170,63,0),
      0 0 0 62px rgba(217,170,63,0);
  }
}

/* Asegúrate de que el input no tenga opacidad baja o filtros que lo oculten */
#yearRange {
  -webkit-appearance: none;
  appearance: none;
}

/* =========================
   FAB · enlace a diagrama temporal (abajo derecha)
   ========================= */
.flow-fab{
  position: fixed;
  right: calc(var(--edgePad, 14px) + 6px);
  bottom: calc(var(--edgePad, 14px) + 6px);
  z-index: 999999; /* por encima de todo */
  width: 46px;
  height: 46px;
  border-radius: 999px;

  display: grid;
  place-items: center;

  background: rgba(15,22,32,0.62);
  border: 1px solid rgba(255,255,255,0.14);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 16px 50px rgba(0,0,0,.45);

  color: #e7edf5;
  text-decoration: none;

  cursor: pointer;
  user-select: none;
  transition: transform .12s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease;
}

.flow-fab:hover{
  transform: translateY(-1px);
  background: rgba(15,22,32,0.78);
  border-color: rgba(217,170,63,0.35);
  box-shadow: 0 18px 60px rgba(0,0,0,.55), 0 0 0 6px rgba(217,170,63,.06);
}

.flow-fab:active{
  transform: translateY(0px) scale(0.98);
}

.flow-fab svg{
  width: 22px;
  height: 22px;
  display: block;
  opacity: .95;
}

  MINI MAP como FONDO (derecha)
   (render limpio: blur solo en land, graticule sin blur)
   ========================= */

.modelPanel{
  position: relative;     /* clave para el absoluto */
  overflow: hidden;       /* recorta el mapa dentro del panel */
}

/* contenedor del “fondo-mapa” */
.mp-mapbg{
  position: absolute;
  right: -36px;
  top: 0px;
  width: 560px;
  height: 340px;

  pointer-events: none;
  z-index: 0;

  opacity: .55;

  /* ✅ clip real + estabilidad de composición */
  border-radius: 18px;
  overflow: hidden;

  will-change: transform;
  transform: translateZ(0);
  isolation: isolate;
}

/* el SVG ocupa el contenedor */
.mp-mapbg svg{
  width: 100%;
  height: 100%;
  display: block;

  /* ✅ evita artefactos de composición */
  transform: translateZ(0);
  backface-visibility: hidden;
}

/* ===== TIERRA (continentes) =====
   ✅ blur SOLO aquí para que el mapa sea reconocible sin “bandas” raras
*/
.mp-mapbg .land{
  filter: blur(0.85px);
  opacity: 1;
  transform: translateZ(0);
}

.mp-mapbg .land path{
  fill: rgba(231,237,245,0.18);
  stroke: rgba(231,237,245,0.22);
  stroke-width: 1.1;

  /* ✅ mejora bordes en algunos renders */
  shape-rendering: geometricPrecision;
}

/* ===== GRATICULE (rejilla) =====
   ✅ SIN blur + muy suave para que no “ensucie” arriba
*/
.mp-mapbg .graticule{
  filter: none !important;
  opacity: .38; /* baja la presencia global */
}

.mp-mapbg .graticule path{
  fill: none;
  stroke: rgba(231,237,245,0.10);
  stroke-width: 1;

  /* ✅ hace que la rejilla no se convierta en “barras” */
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 2.2 6.5;
}

/* (Opcional) punto */
.mp-mapbg .mini-dot{
  stroke: rgba(255,255,255,0.85);
  stroke-width: 2;
}

/* ===== Fade real a transparente: MASK (tu versión) ===== */
.mp-mapbg{
  -webkit-mask-image:
    linear-gradient(to left,
      rgba(0,0,0,1) 0%,
      rgba(0,0,0,1) 68%,
      rgba(0,0,0,0) 97%
    ),
    linear-gradient(to bottom,
      rgba(0,0,0,1) 0%,
      rgba(0,0,0,1) 50%,
      rgba(0,0,0,0.35) 62%,
      rgba(0,0,0,0) 78%
    );
  -webkit-mask-composite: source-in;

  mask-image:
    linear-gradient(to left,
      rgba(0,0,0,1) 0%,
      rgba(0,0,0,1) 68%,
      rgba(0,0,0,0) 97%
    ),
    linear-gradient(to bottom,
      rgba(0,0,0,1) 0%,
      rgba(0,0,0,1) 50%,
      rgba(0,0,0,0.35) 62%,
      rgba(0,0,0,0) 78%
    );
  mask-composite: intersect;
}


/* velo MUY suave */
.mp-mapbg::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background: radial-gradient(240px 160px at 70% 45%, rgba(255,255,255,0.05), transparent 65%);
}

async function fetchJson(url){
  const res = await fetch(url, { cache:'no-store' });
  if(!res.ok) throw new Error(`HTTP ${res.status} al cargar ${url}`);
  return await res.json();
}
  
function gh(path){ return `${GH_BASE}/${path}`; }

function _asArray(v){
  if (!v) return [];
  if (Array.isArray(v)) return v.filter(Boolean);
  return String(v).split(/[,|]/).map(s=>s.trim()).filter(Boolean);
}
  // =========================
// HELPERS (copiados de Modelos)

function escapeHtml(s){
  return String(s ?? '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

function hexToRgba(hex, a=1){
  const h = String(hex ?? '').replace('#','').trim();
  if(h.length === 3){
    const r = parseInt(h[0]+h[0],16), g = parseInt(h[1]+h[1],16), b = parseInt(h[2]+h[2],16);
    return `rgba(${r},${g},${b},${a})`;
  }
  if(h.length >= 6){
    const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
    return `rgba(${r},${g},${b},${a})`;
  }
  return `rgba(255,255,255,${a})`;
}

function acc(title, count, bodyHtml, open=false){
  return `
    <details ${open ? 'open' : ''}>
      <summary>
        <span>${escapeHtml(title)}</span>
        <span class="sumRight">
          <span class="sumCount">${count}</span>

        </span>

      <div class="body">${bodyHtml}</div>

  `;
}

function sectionListInner(arr, opts={}){
  const a = Array.isArray(arr) ? arr.filter(Boolean) : [];
  const asList = !!opts.asList;
  if(!a.length) return `<div>—</div>`;
  if(asList){
    return `<ul class="mp-list">${a.map(x => `<li>${escapeHtml(x)}</li>`).join('')}</ul>`;
  }
  return `<div>${a.map(x => escapeHtml(x)).join(', ')}</div>`;
}

function sectionProceduresInner(arr){
  const a = Array.isArray(arr) ? arr : [];
  const clean = a
    .filter(Boolean)
    .filter(p => {
      const hasName = (p.nombre && String(p.nombre).trim().length);
      const hasText = (p.texto && String(p.texto).trim().length);
      const hasCode = (p.codigo && String(p.codigo).trim().length);
      return hasName || hasText || hasCode;
    });

  if(!clean.length) return `<div>—</div>`;

  return `
    <div class="mp-sub">
      ${clean.map(p => {
        const title = escapeHtml(p.nombre && String(p.nombre).trim() ? p.nombre : 'Sin título');
        const code  = (p.codigo && String(p.codigo).trim())
          ? `<span class="mp-code">${escapeHtml(p.codigo)}</span>` : '';
        const bodyText = (p.texto && String(p.texto).trim()) ? p.texto : '—';

        return `
          <details>
            <summary>
              <span class="subLeft">
                <span class="subTitle">${title}</span>
              </span>
              <span class="subRight">
                ${code}
                <span class="chev">▾</span>
              </span>
            </summary>
            <div class="subBody">${escapeHtml(bodyText)}</div>
          </details>
        `;
      }).join('')}
    </div>
  `;
}

function sectionAliInner(obj){
  if(!obj || typeof obj !== 'object') return `<div>—</div>`;
  const entries = Object.entries(obj).filter(([k,v]) => v && String(v).trim());
  if(!entries.length) return `<div>—</div>`;

  const nice = (k) => k
    .replace(/^ALI_/, '')
    .replace(/([A-Z])/g, ' $1')
    .replace(/_/g,' ')
    .trim();

  return entries.map(([k,v]) => `
    <div style="margin:10px 0 0 0">
      <div style="font-weight:900; color:#fff; font-size:12px">${escapeHtml(nice(k))}</div>
      <div style="margin-top:6px; white-space:pre-wrap;">${escapeHtml(v)}</div>
    </div>
  `).join('');
}

function sectionNeimeyerInner(obj){
  if(!obj || typeof obj !== 'object') return `<div>—</div>`;

  const keys = ['epistemologico','teoriaFormal','teoriaClinica'];
  const labels = {
    epistemologico: 'Epistemológico',
    teoriaFormal: 'Teoría formal',
    teoriaClinica: 'Teoría clínica'
  };

  const blocks = keys
    .map(k => [k, obj[k]])
    .filter(([k,v]) => v && String(v).trim());

  if(!blocks.length) return `<div>—</div>`;

  return blocks.map(([k,v]) => `
    <div style="margin:10px 0 0 0">
      <div style="font-weight:900; color:#fff; font-size:12px">${escapeHtml(labels[k] ?? k)}</div>
      <div style="margin-top:6px; white-space:pre-wrap;">${escapeHtml(v)}</div>
    </div>
  `).join('');
}

function slugify(s){
  return String(s || '')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\s+/g,'')
    .trim();
}

/**
 * Construye la URL “raw” al JSON completo.
 * Si tu índice trae `file`, úsalo. Si no, hacemos convención:
 *   modelos/<grupo_slug>/<id>.json
 */
function ghModelUrlFrom(m){
  if (!m || !m.file){
    console.warn('⚠️ Modelo sin "file": no se puede cargar ficha completa', m);
    return null;
  }
  // ✅ idéntico a Modelos: GH Pages + Core/<file>
  return gh(`Core/${String(m.file).replace(/^\//,'')}`);
}





async function ensureModelFullFromGitHub(m){
  if(!m) return m;

  // ✅ En Mapamundi NO vale "descripcion+influencias" para considerar full
  // porque el hover ya lo trae.
  const isFull = (obj) =>
    !!obj && (
      Array.isArray(obj.procedimientos) ||
      Array.isArray(obj.micros) ||
      Array.isArray(obj.refs) ||
      (obj.alianzaModelo && typeof obj.alianzaModelo === 'object') ||
      (obj.neimeyer && typeof obj.neimeyer === 'object')
    );

  if (isFull(m)) return m;

  // ✅ single-flight por id
  ensureModelFullFromGitHub._pending = ensureModelFullFromGitHub._pending || new Map();
  const PENDING = ensureModelFullFromGitHub._pending;

  const id = String(m.id ?? '').trim();
  if (!id) return m;

  // cache global si existe
  if (typeof GH_MODEL_CACHE !== 'undefined' && GH_MODEL_CACHE.has(id)){
    return GH_MODEL_CACHE.get(id);
  }
  if (PENDING.has(id)) return await PENDING.get(id);

 const p = (async ()=>{
  // ✅ 0) Si falta m.file, intenta resolverlo por índice global id -> file
  if (!m.file && typeof GH_FILE_BY_ID !== 'undefined' && GH_FILE_BY_ID?.get) {
    const f = GH_FILE_BY_ID.get(id);
    if (f) m.file = f;
  }

  const url = ghModelUrlFrom(m);
  if(!url){
    console.warn('⚠️ ensureModelFullFromGitHub: sin URL (falta m.file)', m);
    return m;
  }


    const delays = [0, 250, 700, 1500];
    let lastErr = null;

    for (let i = 0; i < delays.length; i++){
      if (delays[i]) await new Promise(r => setTimeout(r, delays[i]));
      try{
        const full = await fetchJson(url);

        const merged = { ...m, ...(full || {}) };
        if (!merged.grupo) merged.grupo = m.grupo;
        if (!merged.label) merged.label = m.label;

        if (typeof GH_MODEL_CACHE !== 'undefined'){
          GH_MODEL_CACHE.set(id, merged);
        }
        return merged;
      }catch(err){
        lastErr = err;
      }
    }

    console.error('❌ No se pudo cargar modelo full desde GitHub:', { id, url, err:lastErr });
    return m;
  })();

  PENDING.set(id, p);
  try{
    return await p;
  }finally{
    PENDING.delete(id);
  }
}

  mountEl.innerHTML = `

 <div class="mp-content">

      ${acc('Procedimientos', nProc, sectionProceduresInner(m.procedimientos), false)}

if (!document.__boundDrawerTab){
  document.__boundDrawerTab = true;

  let dragStartX = 0;
  let dragArmed  = false;
  let dragId     = null;

  document.addEventListener('pointerdown', (e)=>{
    const tab = e.target.closest('.mp-drawerTab');
    if(!tab) return;

    dragArmed = true;
    dragStartX = e.clientX;
    dragId = tab.getAttribute('data-open-id') || null;

    // capturamos para que el drag sea fiable
    try{ tab.setPointerCapture(e.pointerId); }catch(_){}
  });

  document.addEventListener('pointermove', (e)=>{
    if(!dragArmed || !dragId) return;

    const dx = e.clientX - dragStartX;

    // umbral: “arrastra a la derecha”
    if (dx > 24){
      dragArmed = false;
    const tab   = e.target.closest('.mp-drawerTab');
const grupo = tab?.getAttribute('data-open-grupo');
const file  = tab?.getAttribute('data-open-file');
openDrawerForId(dragId, { grupo, file });

    }
  });

  document.addEventListener('pointerup', (e)=>{
    const tab = e.target.closest('.mp-drawerTab');

    // si soltó sin arrastrar, tratamos como click
    if (dragArmed && tab){
  const id    = tab.getAttribute('data-open-id');
const grupo = tab.getAttribute('data-open-grupo');
const file  = tab.getAttribute('data-open-file');

if (id) openDrawerForId(id, { grupo, file });

    }

    dragArmed = false;
    dragId = null;
  });
}

// Abrir por ID (busca en MODELS, carga full desde GitHub y renderiza)
async function openDrawerForId(id, hint = {}){

  const target = String(id || '').trim();
  if(!target) return;

  __drawerOpenId = target;
  openDrawer();

  // UI “cargando”
  if (mpDrawerBody){
    mpDrawerBody.innerHTML = `<div class="mp-hint">Cargando ficha completa…</div>`;
  }

  let m = (typeof MODELS !== 'undefined' && Array.isArray(MODELS))
    ? MODELS.find(x => String(x?.id||'').trim() === target)
    : null;

  // fallback: si no está en MODELS, creamos un mínimo para intentar URL por convención
  if(!m) m = { id: target };
  // 🔧 Si venimos desde el hover, inyectamos el mínimo para poder resolver GitHub
if (hint && typeof hint === 'object'){
  if (!m.grupo && hint.grupo) m.grupo = hint.grupo;
  if (!m.file  && hint.file)  m.file  = hint.file;
}

// ✅ 1) Si el modelo no trae `file`, lo resolvemos desde GH (igual que Modelos)
if(!m.file){
  try{
    // Carga index de escuelas si aún no está
    if(!Array.isArray(GH_SCHOOLS) || !GH_SCHOOLS.length){
      GH_SCHOOLS = await fetchJson(gh('Core/escuelas/index.json'));
    }
// ✅ Normalización Mapamundi -> Modelos
if (m && !m.grupo && m.group) m.grupo = m.group;     // 👈 CLAVE
if (m && !m.label && m.label_es) m.label = m.label_es; // si tuvieras variantes
if (m && !m.autores && m.authors) m.autores = m.authors;
if (m && !m.descripcion && m.summary) m.descripcion = m.summary;

    // Encuentra la escuela por label o por slug
    const gLabel = String(m.grupo || '').trim();
    const gSlug  = slugify(gLabel);

    const entry = GH_SCHOOLS.find(s =>
      String(s.label || '').trim() === gLabel ||
      String(s.id || '').trim() === gSlug
    );

  let hit = null;

if (entry?.file) {
  const school  = await fetchJson(gh(`Core/${entry.file}`));
  const modelos = (school?.modelos || []);
  hit = modelos.find(mm => String(mm?.id || '').trim() === target);

  if (hit?.file) {
    m.file = hit.file;
  }
}

// 🔥 Fallback global SOLO si todavía no hay file
if (!m.file) {
  for (const s of (GH_SCHOOLS || [])) {
    if (!s?.file) continue;

    try {
      const school2  = await fetchJson(gh(`Core/${s.file}`));
      const modelos2 = (school2?.modelos || []);
      const hit2 = modelos2.find(mm => String(mm?.id || '').trim() === target);

      if (hit2?.file) {
        m.file = hit2.file;
        if (!m.grupo) m.grupo = s.label;
        break;
      }
    } catch (_) {}
  }
}

  }catch(err){
    console.warn('⚠️ No se pudo resolver m.file desde GH:', target, err);
  }
}
  const full = await ensureModelFullFromGitHub(m);

  // ✅ Merge robusto: conserva lo que tenías en m + añade lo full
  const merged = { ...m, ...(full || {}) };

  // 🧪 Diagnóstico rápido (puedes borrar luego)
  console.log('✅ Drawer merged:', merged.id, {
    grupo: merged.grupo,
    file: merged.file,
    proc: Array.isArray(merged.procedimientos) ? merged.procedimientos.length : null,
    micros: Array.isArray(merged.micros) ? merged.micros.length : null,
    refs: Array.isArray(merged.refs) ? merged.refs.length : null,
    ali: merged.alianzaModelo ? 'yes' : 'no',
    nei: merged.neimeyer ? 'yes' : 'no'
  });

  if (typeof renderDrawerModelInfo === 'function'){
    renderDrawerModelInfo(merged, mpDrawerBody);
  }else{
    mpDrawerBody.innerHTML = `
      <div class="mp-title">${merged.label ?? '—'}</div>
      <div class="mp-author">${merged.autores ?? '—'}</div>
      <div class="mp-desc">${merged.descripcion ?? '—'}</div>
      <div class="mp-hint" style="margin-top:10px;">(Falta pegar renderDrawerModelInfo “como Modelos”).</div>
    `;
  }
}

    'La Teoría del Self Dialógico entiende la identidad como una multiplicidad dinámica de “posiciones del yo” (I-positions) relativamente autónomas, cada una con su propia voz, perspectiva y tono emocional (p. ej., “yo responsable”, “yo vulnerable”, “yo crítico”, “yo ambicioso”, “yo hijo”, “yo profesional”). El self no es un núcleo unitario que controla el resto, sino un sistema polifónico que dialoga internamente y que está profundamente entrelazado con los diálogos externos (relaciones, cultura, roles). El malestar psicológico aparece cuando el repertorio de posiciones se empobrece o se rigidiza (domina una voz, otras quedan silenciadas), cuando ciertos diálogos internos se vuelven estereotipados (crítico–culpable, exigente–fracasado) o cuando hay conflictos no integrados entre posiciones opuestas. La intervención terapéutica se orienta a mapear el repertorio de voces, ampliar posiciones alternativas, facilitar diálogos más flexibles entre partes y crear “meta-posiciones” reflexivas capaces de observar, mediar y reorganizar la experiencia. El cambio se concibe como una reorganización del sistema dialógico: más amplitud de voces disponibles, menos monopolio de una narrativa dominante y mayor capacidad de posicionarse de forma adaptativa según contexto y valores.'
},

  descripcion:
    'El Modelo de Polaridades Semánticas desarrollado por Valeria Ugazio concibe la psicopatología como el resultado de la rigidización de sistemas de significado organizados en torno a polaridades semánticas dominantes (p. ej., dependencia–autonomía, control–abandono, superioridad–inferioridad), construidas y mantenidas en contextos relacionales, especialmente familiares. Cada sistema relacional privilegia determinadas polaridades y restringe otras, delimitando qué historias, emociones e identidades son “permitidas” y cuáles quedan implícita o explícitamente prohibidas. El malestar psicológico emerge cuando una persona queda atrapada en una posición polar rígida, sin posibilidad de moverse dentro del espacio semántico disponible, generando síntomas coherentes con esa organización de significado. La intervención terapéutica se orienta a identificar las polaridades semánticas dominantes, explorar cómo se distribuyen relacionalmente y facilitar la ampliación del campo semántico, permitiendo la emergencia de nuevas posiciones identitarias y narrativas. El cambio se entiende como una flexibilización del sistema de significados relacionales más que como corrección de conductas o cogniciones aisladas.'

/// =========================
// Apple-level: "breathing" robusto (NO usa transitions)
// =========================
const _breath = new Map(); // el -> { raf, t0, baseR }

function startBreath(el, d){
  stopBreath(el);

  // ⚠️ baseR: usa tu función dotRadius(d) (coherente con el zoom)
  // Si por lo que sea no llega d, cae al attr('r')
  const baseR = (d && typeof dotRadius === 'function')
    ? dotRadius(d)
    : (parseFloat(d3.select(el).attr('r')) || 3);

  // fija el radio base inmediatamente (evita “me quedo grande” por transiciones cortadas)
  d3.select(el).interrupt();      // corta transiciones de update sobre ESTE dot
  d3.select(el).attr('r', baseR);

  const entry = { raf: null, t0: 0, baseR, armed: true };

  // esperamos 700ms antes de empezar el breath real
  entry.armed = true;
  entry.tStart = performance.now();

  function tick(now){
    const elapsed = now - entry.tStart;

    // antes de 700ms: NO hacemos nada (cero crecimiento)
    if (elapsed < 0){
      entry.raf = requestAnimationFrame(tick);
      return;
    }

    // a partir de aquí: respiración suave
    if (!entry.t0) entry.t0 = now;

    const t = (now - entry.t0) / 1000;        // segundos
    const amp = 0.28;                          // 8%
    const speed = 0.6;                         // Hz aprox (ajústalo si quieres)

    // seno suave: 0..1..0
    const s = (Math.sin(2 * Math.PI * speed * t) + 1) / 2;
    const r = entry.baseR * (1 + amp * s);

    d3.select(el).attr('r', r);

    entry.raf = requestAnimationFrame(tick);
  }

  entry.raf = requestAnimationFrame(tick);
  _breath.set(el, entry);
}

function stopBreath(el){
  const entry = _breath.get(el);
  if (!entry) return;

  if (entry.raf) cancelAnimationFrame(entry.raf);

  // vuelve EXACTO al radio base
  d3.select(el).attr('r', entry.baseR);

  _breath.delete(el);
}

  const min = Number.isFinite(+yearRange.min) ? +yearRange.min : START_YEAR;

}

function getActiveGroups(){
  const active = new Set();

  // 1) Preferido: estado real (enabled Map)
  if (typeof enabled !== 'undefined' && enabled && typeof enabled.get === 'function'){
    // si existe groups, úsalo (orden y nombres canónicos)
    if (typeof groups !== 'undefined' && Array.isArray(groups)){
      for (const g of groups){
        if (enabled.get(g)) active.add(g);
      }
      return active;
    }

    // si no existe groups, recorremos el Map
    for (const [g, on] of enabled.entries()){
      if (on) active.add(g);
    }
    return active;
  }

  // 2) Fallback: leer la UI de la leyenda (los .lg sin .off)
  document.querySelectorAll('.lg:not(.off)').forEach(el => {
    const txt = (el.textContent || '').trim();
    if (txt) active.add(txt);
  });

  return active;
}

    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');

function hexToRgba(hex, a = 0.2) {
  const h = String(hex || '').trim();
  if (!h.startsWith('#')) return `rgba(255,255,255,${a})`;
  let r = 255, g = 255, b = 255;
  if (h.length === 4) {
    r = parseInt(h[1] + h[1], 16);
    g = parseInt(h[2] + h[2], 16);
    b = parseInt(h[3] + h[3], 16);
  } else if (h.length === 7) {
    r = parseInt(h.slice(1,3), 16);
    g = parseInt(h.slice(3,5), 16);
    b = parseInt(h.slice(5,7), 16);
  }
  return `rgba(${r},${g},${b},${a})`;
}

function _setHostTopOffset(){

    document.querySelector('.navbar') ||
    document.querySelector('[data-role="header"]');
